<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HÜKÜM V13 | SİBER OPERASYON</title>
    <style>
        :root { --neon: #00ff41; --bg: #000; --red: #ff0000; --blue: #00d9ff; --gold: #ffcc00; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 10px; }
        #auth { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .auth-box { border: 2px solid var(--red); padding: 30px; text-align: center; border-radius: 15px; box-shadow: 0 0 20px var(--red); width: 85%; }
        #panel { display: none; }
        .header { border: 1px solid var(--neon); padding: 10px; text-align: center; margin-bottom: 10px; font-weight: bold; background: #050505; }
        #log { background: #000; border: 1px solid var(--neon); height: 150px; overflow-y: auto; padding: 10px; font-size: 11px; margin-bottom: 15px; color: #fff; box-shadow: inset 0 0 10px var(--neon); }
        .grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .unit-btn { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; border-radius: 5px; }
        .unit-btn:hover { background: #003300; }
        #op-window { display: none; border: 2px solid var(--blue); padding: 15px; margin-top: 15px; background: #000a10; border-radius: 10px; }
        .cmd-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; max-height: 250px; overflow-y: auto; }
        .cmd-btn { background: #000; border: 1px solid var(--blue); color: var(--blue); padding: 8px; font-size: 10px; cursor: pointer; }
        #form-box { display: none; margin-top: 15px; border-top: 1px dashed var(--blue); padding-top: 10px; }
        .h-in { background: #000; border: 1px solid var(--neon); color: var(--neon); width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; }
        .run-btn { background: var(--neon); color: #000; border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; }
    </style>
</head>
<body>

<div id="auth">
    <div class="auth-box">
        <h2 style="color:var(--red)">HÜKÜM V13 GİRİŞ</h2>
        <input type="password" id="pw" class="h-in" placeholder="Şifre: 1881 1922" style="text-align:center">
        <button class="run-btn" style="background:var(--red); color:white" onclick="login()">SİSTEME SIZ</button>
    </div>
</div>

<div id="panel">
    <div class="header">KOMUTAN: EYO PAŞA | BİRİM: HÜKÜM | DURUM: OPERASYONEL</div>
    <div id="log">[SYSTEM] Anonim ağ köprüsü kuruldu. Hedefler bekleniyor...<br></div>
    <div class="grid" id="main-nav"></div>
    <div id="op-window">
        <h3 id="utitle" style="margin:0 0 10px 0; color:var(--blue); font-size:14px;">BİRİM</h3>
        <div class="cmd-grid" id="clist"></div>
        <div id="form-box">
            <div id="fields"></div>
            <button class="run-btn" onclick="execute()">OPERASYONU BAŞLAT</button>
        </div>
    </div>
</div>

<script>
    const db = {
        "1. BEYAZ HACKER (50 Komut)": Array.from({length: 50}, (_, i) => `Defans Modu ${i+1}`),
        "2. SİBER ŞUBE (50 Komut)": Array.from({length: 50}, (_, i) => `Sorgu Birimi ${i+1}`),
        "3. DARK WEB (20 Komut)": Array.from({length: 20}, (_, i) => `Dark Node ${i+1}`),
        "4. DERİN DEVLET (50 Komut)": Array.from({length: 50}, (_, i) => `İstihbarat ${i+1}`),
        "5. SİTE OPERASYON (20 Komut)": Array.from({length: 20}, (_, i) => `Site Attack ${i+1}`)
    };

    // Gerçek isimlerle güncelleme (Örnekler)
    db["2. SİBER ŞUBE (50 Komut)"][0] = "İsimden Adres Bul"; db["2. SİBER ŞUBE (50 Komut)"][1] = "TC'den Aile Sorgu";
    db["4. DERİN DEVLET (50 Komut)"][0] = "Örgüt Deşifre (C31K)"; db["4. DERİN DEVLET (50 Komut)"][1] = "Vatan Haini Takip";
    db["5. SİTE OPERASYON (20 Komut)"][0] = "Siteye Giren IPler"; db["5. SİTE OPERASYON (20 Komut)"][1] = "Admin Paneli Bul";

    let current = "";

    function login() {
        if(document.getElementById('pw').value === "1881 1922") {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
            Object.keys(db).forEach(u => document.getElementById('main-nav').innerHTML += `<button class="unit-btn" onclick="openU('${u}')">${u}</button>`);
        } else { alert("ERİŞİM REDDEDİLDİ!"); }
    }

    function addLog(m, c="#00ff41") {
        const l = document.getElementById('log');
        l.innerHTML += `<span style="color:${c}">[SONUÇ] ${m}</span><br>`;
        l.scrollTop = l.scrollHeight;
    }

    function openU(u) {
        document.getElementById('op-window').style.display = 'block';
        document.getElementById('form-box').style.display = 'none';
        document.getElementById('utitle').innerText = u;
        const list = document.getElementById('clist');
        list.innerHTML = "";
        db[u].forEach(c => list.innerHTML += `<button class="cmd-btn" onclick="prep('${c}')">${c}</button>`);
    }

    function prep(c) {
        current = c;
        document.getElementById('form-box').style.display = 'block';
        const f = document.getElementById('fields');
        f.innerHTML = `<p style="font-size:12px; color:yellow">${c} için hedef verisi girin:</p>
                       <input type="text" id="v1" class="h-in" placeholder="Hedef (İsim/IP/URL/Link)">`;
    }

    function execute() {
        const v = document.getElementById('v1').value;
        if(!v) return alert("HEDEF BOŞ!");
        addLog(`${current} başlatıldı. Hedef: ${v}`, "yellow");
        
        setTimeout(() => {
            if(current.includes("İsim") || current.includes("Sorgu")) {
                addLog(`ANALİZ: ${v} verisi siber havuzda tarandı. Dijital izler tespit edildi.`, "#00ff41");
                window.open(`https://www.google.com/search?q="${v}"`, '_blank');
            } else if(current.includes("IP")) {
                window.open(`https://ipinfo.io/${v}`, '_blank');
                addLog(`BAŞARI: ${v} konum verileri çekildi.`, "#00ff41");
            } else if(current.includes("Örgüt") || current.includes("Haini")) {
                addLog(`İCRAAT: ${v} verileri EGM siber sistemine anonim olarak iletildi. Takip No: ${Math.floor(Math.random()*10000)}`, "red");
            } else {
                addLog(`${current} işlemi ${v} üzerinde %100 başarıyla tamamlandı.`, "#00ff41");
            }
        }, 1500);
    }
</script>
</body>
</html>
