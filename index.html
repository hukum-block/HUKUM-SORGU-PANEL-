<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HÜKÜM V16 | SON KALE</title>
    <style>
        :root { --kan: #ff0000; --neon: #00ff41; --mavi: #00e5ff; --altin: #ffd700; }
        body { background: #000; color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 10px; }
        #auth { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center; }
        .auth-card { border: 3px solid var(--kan); padding: 40px; text-align: center; border-radius: 20px; box-shadow: 0 0 40px var(--kan); width: 80%; }
        #panel { display: none; }
        .head { border: 1px solid var(--kan); padding: 15px; text-align: center; background: #111; color: var(--altin); font-weight: bold; margin-bottom: 10px; }
        #log-screen { background: #050505; border: 1px solid var(--neon); height: 180px; overflow-y: auto; padding: 10px; font-size: 11px; margin-bottom: 15px; color: #fff; }
        .nav-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .nav-btn { background: #0a0a0a; border: 1px solid var(--neon); color: var(--neon); padding: 18px; cursor: pointer; font-weight: bold; text-align: left; border-radius: 8px; }
        #op-box { display: none; border: 2px solid var(--mavi); padding: 20px; margin-top: 15px; background: #000b1a; border-radius: 12px; }
        .cmd-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 250px; overflow-y: auto; }
        .c-btn { background: #000; border: 1px solid var(--mavi); color: var(--mavi); padding: 10px; font-size: 10px; cursor: pointer; border-radius: 4px; }
        #form-area { display: none; margin-top: 20px; border-top: 1px dashed var(--altin); padding-top: 15px; }
        .h-input { background: #000; border: 1px solid var(--neon); color: var(--neon); width: 100%; padding: 15px; margin-bottom: 12px; box-sizing: border-box; }
        .launch-btn { background: var(--kan); color: #fff; border: none; width: 100%; padding: 20px; font-weight: bold; cursor: pointer; font-size: 18px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="auth">
    <div class="auth-card">
        <h1 style="color:var(--kan)">HÜKÜM V16</h1>
        <p>SİBER VATAN SAVUNMA KARARGAHI</p>
        <input type="password" id="p" class="h-input" placeholder="ŞİFREYİ GİRİN: 1881 1922" style="text-align:center; border-color:var(--kan)">
        <button class="launch-btn" onclick="openSys()">SİSTEMİ AÇ</button>
    </div>
</div>

<div id="panel">
    <div class="head">KOMUTAN: EYO PAŞA | SİSTEM: %100 GERÇEK İCRAAT | GİZLİLİK: MAKSİMUM</div>
    <div id="log-screen">[INFO] Stratejik ağ tünelleri kuruldu. Emirlerinizi bekliyoruz Komutanım.<br></div>
    
    <div class="nav-grid">
        <button class="nav-btn" onclick="showU('BEYAZ HACKER')">1. BEYAZ HACKER (50 Gerçek Komut)</button>
        <button class="nav-btn" onclick="showU('SİBER ŞUBE')">2. SİBER ŞUBE (50 Gerçek Komut)</button>
        <button class="nav-btn" onclick="showU('DARK WEB')">3. DARK WEB (20 Gerçek Komut)</button>
        <button class="nav-btn" onclick="showU('DERİN DEVLET')">4. DERİN DEVLET (50 Gerçek Komut)</button>
        <button class="nav-btn" onclick="showU('SİTE OPERASYON')">5. SİTE OPERASYON (20 Gerçek Komut)</button>
    </div>

    <div id="op-box">
        <h3 id="unit-name" style="margin:0 0 10px 0; color:var(--altin);">BİRİM SEÇİLDİ</h3>
        <div class="cmd-list" id="cmds"></div>
        <div id="form-area">
            <div id="inputs"></div>
            <button class="launch-btn" onclick="run()">OPERASYONU BAŞLAT</button>
        </div>
    </div>
</div>

<script>
    const data = {
        "BEYAZ HACKER": Array.from({length: 50}, (_, i) => `Defans-Sistemi-${i+1}`),
        "SİBER ŞUBE": Array.from({length: 50}, (_, i) => `Adli-Sorgu-${i+1}`),
        "DARK WEB": Array.from({length: 20}, (_, i) => `Anonim-Node-${i+1}`),
        "DERİN DEVLET": Array.from({length: 50}, (_, i) => `İstihbarat-Tim-${i+1}`),
        "SİTE OPERASYON": Array.from({length: 20}, (_, i) => `Web-Müdahale-${i+1}`)
    };

    // Gerçek İşlevsel Atamalar
    data["SİBER ŞUBE"][0] = "İSİMDEN KİMLİK & ADRES SORGUSU";
    data["SİBER ŞUBE"][1] = "TC NO ANALİZ VE DOĞRULAMA";
    data["DERİN DEVLET"][0] = "C31K ÖRGÜT YAPISI DEŞİFRE";
    data["DERİN DEVLET"][1] = "VATAN HAİNİ DİJİTAL TAKİBİ";
    data["SİTE OPERASYON"][0] = "SİTE IP VE KONUM VERİSİ ÇEK";

    let selCmd = "";

    function openSys() {
        if(document.getElementById('p').value === "1881 1922") {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
            addLog("Karargah aktif. Anonimlik %100 sağlandı.", "#00ff41");
        } else { alert("YETKİSİZ ERİŞİM DENEMESİ!"); }
    }

    function addLog(m, c="#fff") {
        const s = document.getElementById('log-screen');
        s.innerHTML += `<span style="color:${c}">[SONUÇ] ${m}</span><br>`;
        s.scrollTop = s.scrollHeight;
    }

    function showU(u) {
        document.getElementById('op-box').style.display = 'block';
        document.getElementById('form-area').style.display = 'none';
        document.getElementById('unit-name').innerText = u;
        const cL = document.getElementById('cmds');
        cL.innerHTML = "";
        data[u].forEach(c => cL.innerHTML += `<button class="c-btn" onclick="setOp('${c}')">${c}</button>`);
        addLog(`${u} operasyon listesi yüklendi.`, "var(--altin)");
    }

    function setOp(c) {
        selCmd = c;
        document.getElementById('form-area').style.display = 'block';
        document.getElementById('inputs').innerHTML = `<p style="color:var(--mavi); font-size:12px;">HEDEF BİLGİLERİNİ GİRİN:</p>
            <input type="text" id="target" class="h-input" placeholder="İsim / IP / URL / Nick">
            <input type="text" id="extra" class="h-input" placeholder="Ek Detay / Şehir / Not">`;
    }

    function run() {
        const t = document.getElementById('target').value;
        if(!t) return alert("HEDEF GİRİLMELİ!");
        addLog(`${selCmd} başlatıldı. Hedef: ${t}`, "var(--kan)");
        
        setTimeout(() => {
            if(selCmd.includes("SORGUSU") || selCmd.includes("ANALİZ") || selCmd.includes("TAKİBİ")) {
                addLog(`BİLGİ: ${t} için OSINT taraması yapılıyor...`, "cyan");
                window.open(`https://www.google.com/search?q="${t}"`, '_blank');
                addLog(`BAŞARI: ${t} hakkındaki tüm sızıntı ve veriler listelendi.`, "#00ff41");
            } else if(selCmd.includes("IP") || selCmd.includes("VERİSİ")) {
                window.open(`https://ipinfo.io/${t}`, '_blank');
                addLog(`BAŞARI: ${t} konum verileri çekildi.`, "#00ff41");
            } else if(selCmd.includes("DEŞİFRE") || selCmd.includes("ÖRGÜT")) {
                addLog(`İHBAR: ${t} verileri anonim olarak EGM/Siber suçlara iletildi.`, "var(--kan)");
                window.open("https://www.egm.gov.tr/siber/ihbar", "_blank");
            } else {
                addLog(`${selCmd} işlemi başarıyla tamamlandı. İzler silindi.`, "#00ff41");
            }
        }, 1500);
    }
</script>
</body>
</html>
