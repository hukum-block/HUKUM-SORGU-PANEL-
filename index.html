<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HÜKÜM-SORGU | RESMİ PANEL</title>
    <style>
        :root { --neon: #00ff41; --danger: #ff0000; --dark: #080808; }
        body { background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 0; }
        
        /* KAYIT VE GİRİŞ EKRANI (DUVAR) */
        #auth-wall { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; justify-content:center; align-items:center; }
        .auth-card { border: 2px solid var(--neon); padding: 30px; border-radius: 15px; box-shadow: 0 0 30px var(--neon); text-align: center; width: 85%; max-width: 350px; }
        input { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 12px; margin: 10px 0; width: 100%; border-radius: 5px; box-sizing: border-box; }
        .btn-main { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 5px; }

        /* ANA PANEL */
        #panel-content { display: none; padding: 15px; }
        .header { border-bottom: 2px solid var(--neon); padding: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* ÖZEL LOG KANALI (VERİ ÇIKTILARI) */
        .terminal-log { background: #001100; border: 1px solid #004400; height: 180px; overflow-y: auto; padding: 10px; font-size: 11px; margin-bottom: 20px; color: #fff; border-left: 5px solid var(--neon); box-shadow: inset 0 0 10px #000; }
        .log-line { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 2px; }

        /* 40 KOMUT BUTONLARI */
        .cmd-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .cmd-unit { background: #111; border: 1px solid #333; padding: 10px; font-size: 10px; cursor: pointer; text-align: center; transition: 0.3s; }
        .cmd-unit:hover { border-color: var(--neon); background: #002200; box-shadow: 0 0 10px var(--neon); }

        /* SOSYAL ALAN (SESLİ & YAZILI) */
        .social-grid { margin-top: 30px; display: grid; gap: 20px; }
        .stream-area { border: 2px solid var(--danger); padding: 15px; border-radius: 20px; text-align: center; background: #000; }
        .stream-slots { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .user-slot { width: 55px; height: 55px; border: 2px solid #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; position: relative; }
        .user-slot.active { border-color: var(--danger); box-shadow: 0 0 15px var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .chat-container { border: 1px solid var(--neon); height: 250px; display: flex; flex-direction: column; background: #0a0a0a; border-radius: 10px; overflow: hidden; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        
        .guide-box { background: #111; padding: 15px; margin-top: 25px; border-left: 5px solid #ff0; font-size: 11px; text-align: left; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="auth-wall">
        <div class="auth-card">
            <h1 style="color:var(--neon); margin:0;">HÜKÜM-SORGU</h1>
            <p id="auth-status" style="font-size:12px;">Siber Karargâh Kayıt Modu</p>
            <input type="text" id="username" placeholder="Kod Adınız">
            <input type="password" id="password" placeholder="Şifreniz">
            <button class="btn-main" onclick="handleAuth()" id="auth-btn">KAYIT OL</button>
            <p style="font-size: 10px; margin-top: 15px; cursor: pointer; color: #888;" onclick="toggleAuth()">Zaten üyeyim, Giriş Yap</p>
        </div>
    </div>

    <div id="panel-content">
        <div class="header">
            <span>BAŞKOMUTAN: <b id="user-display" style="color:white;"></b></span>
            <span style="color:var(--danger); font-weight:bold; cursor:pointer;" onclick="location.reload()">[ GÜVENLİ ÇIKIŞ ]</span>
        </div>

        <h4>ÖZEL LOG KANALI (VERİ MERKEZİ)</h4>
        <div class="terminal-log" id="log-channel">
            <div class="log-line">Sistem aktif. Sorgu bekleniyor...</div>
        </div>
        
        <input type="text" id="target-input" placeholder="Hedef IP, Domain veya No giriniz...">
        
        <h4>40 STRATEJİK KOMUT</h4>
        <div class="cmd-grid" id="cmd-box"></div>

        <div class="social-grid">
            <div class="stream-area">
                <span style="color: var(--danger); font-weight: bold; font-size: 14px;">● CANLI YAYIN (MAX 10)</span>
                <div class="stream-slots" id="stream-slots">
                    <div class="user-slot" id="admin-voice">EYMEN</div>
                </div>
                <button onclick="toggleVoice()" id="voice-btn" style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:20px; margin-top:15px; font-weight:bold; cursor:pointer;">YAYINI AÇ</button>
            </div>

            <div class="chat-container">
                <div style="background:#111; padding:5px; font-size:12px; border-bottom:1px solid var(--neon);">HÜKÜM GENEL SOHBET</div>
                <div id="chat-window"></div>
                <div style="display:flex; padding:5px; background:#000;">
                    <input type="text" id="chat-msg" placeholder="Mesaj..." style="margin:0; border:none; background:#111;">
                    <button onclick="sendMessage()" style="width:25%; background:var(--neon); border:none; color:#000; font-weight:bold;">GÖNDER</button>
                </div>
            </div>
        </div>

        <div class="guide-box">
            <h3 style="color:#ff0; margin-top:0;">HÜKÜM KULLANIM KLAVUZU</h3>
            <div id="guide-list"></div>
        </div>
    </div>

    <script>
        let loginMode = false;
        const opList = [
            "Whois", "IP Geo", "Port Scan", "DNS Info", "Rev IP", "Subdomain", "Trace", "SSL Check", "Shodan", "Pwned",
            "HoneyPot", "Ping", "Robots", "CF Check", "MAC Info", "Hash Dec", "EXIF", "Social", "Virus Scan", "SQL Map",
            "Proxy", "CMS", "Mail Auth", "Log Save", "Google Dork", "Attack", "Phish Check", "SiteMap", "EGM İhbar", "Admin",
            "DDoS Guard", "Packet", "ISP Info", "OS Detect", "Headers", "Firewall", "Cookie", "Wayback", "Phone Info", "Meta"
        ];

        const infoGuide = {
            "Whois": "Sitenin kayıtlı olduğu kişi ve şirket bilgilerini loga atar.",
            "IP Geo": "Hedefin şehir, mahalle ve operatör bilgisini gösterir.",
            "Pwned": "E-postanın çalınmış şifrelerini sızıntı veritabanında arar.",
            "Phone Info": "Telefonun operatör ve aktiflik durumunu sorgular.",
            "EGM İhbar": "Siber saldırı kanıtlarını direkt emniyete gönderir."
        };

        function toggleAuth() {
            loginMode = !loginMode;
            document.getElementById("auth-status").innerText = loginMode ? "Sisteme Giriş Yap" : "Siber Karargâh Kayıt Modu";
            document.getElementById("auth-btn").innerText = loginMode ? "GİRİŞ YAP" : "KAYIT OL";
        }

        function handleAuth() {
            const u = document.getElementById("username").value;
            const p = document.getElementById("password").value;
            if(!u || !p) return alert("Bilgileri gir aslanım!");
            
            if(!loginMode) {
                localStorage.setItem("h_u", u); localStorage.setItem("h_p", p);
                alert("Kayıt Başarılı! Şimdi Giriş Yap."); toggleAuth();
            } else {
                if(u === localStorage.getItem("h_u") && p === localStorage.getItem("h_p")) {
                    document.getElementById("auth-wall").style.display = "none";
                    document.getElementById("panel-content").style.display = "block";
                    document.getElementById("user-display").innerText = u.toUpperCase();
                    initKarargah();
                } else { alert("Yanlış şifre veya kullanıcı adı!"); }
            }
        }

        function initKarargah() {
            const grid = document.getElementById("cmd-box");
            const guide = document.getElementById("guide-list");
            opList.forEach((cmd, i) => {
                let div = document.createElement("div");
                div.className = "cmd-unit";
                div.innerText = (i+1) + ". " + cmd;
                div.onclick = () => runCommand(cmd);
                grid.appendChild(div);

                let p = document.createElement("p");
                p.innerHTML = `<b>${cmd}:</b> ${infoGuide[cmd] || "Siber analiz verisi toplar ve loglar."}`;
                guide.appendChild(p);
            });
        }

        function runCommand(name) {
            const target = document.getElementById("target-input").value;
            if(!target) return alert("Hedef girmeden işlem yapılamaz!");
            const log = document.getElementById("log-channel");
            
            log.innerHTML += `<div class="log-line" style="color:cyan;">[SORGULANIYOR] ${name} işlemi başlatıldı... Target: ${target}</div>`;
            
            setTimeout(() => {
                let res = "İŞLEM TAMAMLANDI: Veriler şifreli olarak kaydedildi.";
                if(name === "IP Geo") res = "LOKASYON: Siirt/Kurtalan - OPERATÖR: Türk Telekom - IP: 176.XXX.XX";
                if(name === "Phone Info") res = "NUMARA: +90 5xx... - DURUM: Aktif - BÖLGE: Güneydoğu";
                
                log.innerHTML += `<div class="log-line" style="color:white;">[VERİ] ${name} ÇIKTISI: ${res}</div>`;
                log.scrollTop = log.scrollHeight;
            }, 1000);
        }

        function toggleVoice() {
            const btn = document.getElementById("voice-btn");
            const slot = document.getElementById("admin-voice");
            if(btn.innerText === "YAYINI AÇ") {
                btn.innerText = "YAYINI KAPAT";
                slot.classList.add("active");
                alert("Canlı yayın başladı! Karargâhtaki herkes seni duyabilir.");
            } else {
                btn.innerText = "YAYINI AÇ";
                slot.classList.remove("active");
            }
        }

        function sendMessage() {
            const inp = document.getElementById("chat-msg");
            if(!inp.value) return;
            const window = document.getElementById("chat-window");
            window.innerHTML += `<div><b style="color:var(--neon)">${localStorage.getItem("h_u")}:</b> ${inp.value}</div>`;
            inp.value = "";
            window.scrollTop = window.scrollHeight;
        }
    </script>
</body>
</html>
