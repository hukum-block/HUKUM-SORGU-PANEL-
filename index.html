<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HÜKÜM V12 | VATAN MÜDAFAASI</title>
    <style>
        :root { --kirmizi: #ff0000; --beyaz: #ffffff; --neon: #00ff41; --mavi: #00e1ff; }
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; }
        
        /* GİRİŞ */
        #login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; justify-content: center; align-items: center; }
        .login-box { border: 2px solid var(--kirmizi); padding: 30px; text-align: center; box-shadow: 0 0 25px var(--kirmizi); border-radius: 15px; width: 85%; }

        /* KARARGAH */
        #panel { display: none; }
        .header { border: 2px solid var(--kirmizi); padding: 10px; text-align: center; background: #1a0000; font-weight: bold; margin-bottom: 10px; border-radius: 5px; }
        
        /* İCRAAT LOGU */
        #log-flow { background: #050505; border: 1px solid var(--neon); height: 180px; overflow-y: auto; padding: 10px; font-size: 11px; margin-bottom: 15px; color: var(--neon); box-shadow: inset 0 0 10px #00ff41; }

        /* 10 ANA BİRİM */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { background: #111; border: 1px solid var(--kirmizi); color: #fff; padding: 15px; cursor: pointer; font-size: 11px; font-weight: bold; border-radius: 5px; }
        .btn:hover { background: var(--kirmizi); color: #000; }

        /* OPERASYON PENCERESİ */
        #op-window { display: none; border: 2px solid var(--mavi); padding: 15px; margin-top: 15px; background: #000a10; border-radius: 10px; }
        .input-h { background: #000; border: 1px solid var(--mavi); color: var(--mavi); width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; }
        .run-btn { background: var(--mavi); color: #000; border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; font-size: 16px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="login">
    <div class="login-box">
        <h2 style="color:var(--kirmizi)">HÜKÜM V12: VATAN MÜDAFAASI</h2>
        <input type="password" id="pass" class="input-h" placeholder="Şifre: 1881 1922" style="text-align:center; border-color:var(--kirmizi)">
        <button class="run-btn" style="background:var(--kirmizi); color:white" onclick="auth()">SİSTEME GİRİŞ</button>
    </div>
</div>

<div id="panel">
    <div class="header">PAŞA: EYMEN | BİRLİK: HÜKÜM | DURUM: SAVAŞ MODU</div>
    
    <div id="log-flow">[SİSTEM] Siber istihbarat ağına bağlanıldı. Emirleriniz bekleniyor Paşam.<br></div>

    <div class="grid">
        <button class="btn" onclick="openOp('C31K/ATAT Takip')">ÖRGÜT TAKİBİ</button>
        <button class="btn" onclick="openOp('Dış Tehdit Analiz')">DIŞ TEHDİT (YUN/İSR)</button>
        <button class="btn" onclick="openOp('Hain Sorgulama')">HAİN SORGULAMA</button>
        <button class="btn" onclick="openOp('İhbar Hattı')">EGM/SİBER İHBAR</button>
        <button class="btn" onclick="openOp('Siber İstihkam')">SİBER SAVUNMA</button>
        <button class="btn" onclick="openOp('Veri Sızıntısı')">SIZINTI TARA</button>
    </div>

    <div id="op-window">
        <h3 id="op-name" style="margin:0 0 10px 0; color:var(--mavi); font-size:14px;">BİRİM AKTİF</h3>
        <div id="form-box"></div>
        <button class="run-btn" onclick="launch()">OPERASYONU BAŞLAT</button>
    </div>
</div>

<script>
    let sel = "";

    function auth() {
        if(document.getElementById('pass').value === "1881 1922") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
            addLog("Bağlantı kuruldu. Anonimlik %100.", "#00ff41");
        } else { alert("HATALI GİRİŞ!"); }
    }

    function addLog(m, c="white") {
        const l = document.getElementById('log-flow');
        l.innerHTML += `<span style="color:${c}">[İCRAAT] ${m}</span><br>`;
        l.scrollTop = l.scrollHeight;
    }

    function openOp(op) {
        sel = op;
        document.getElementById('op-window').style.display = 'block';
        document.getElementById('op-name').innerText = op;
        const fb = document.getElementById('form-box');
        fb.innerHTML = "";

        if(op === 'Hain Sorgulama') {
            fb.innerHTML = `<input type="text" id="v1" class="input-h" placeholder="Hain Ad-Soyad">
                            <input type="text" id="v2" class="input-h" placeholder="Kullandığı Nickname">`;
        } else if(op === 'C31K/ATAT Takip') {
            fb.innerHTML = `<input type="text" id="v1" class="input-h" placeholder="Grup Adı veya Telegram/Discord Linki">
                            <input type="text" id="v2" class="input-h" placeholder="Saldırı Hedefi/Bilgi">`;
        } else {
            fb.innerHTML = `<input type="text" id="v1" class="input-h" placeholder="Hedef Bilgi (IP/URL/Link)">`;
        }
        addLog(`${op} birimi hazırlık moduna geçti.`, "yellow");
    }

    function launch() {
        const d1 = document.getElementById('v1').value;
        if(!d1) return alert("VERİ GİRİLMELİ!");

        addLog(`OPERASYON BAŞLATILDI: ${sel} -> ${d1}`, "red");
        
        setTimeout(() => {
            if(sel === 'Hain Sorgulama') {
                addLog(`ANALİZ: ${d1} için tüm sanal platformlar (Discord/Telegram/Twitter) taranıyor...`, "cyan");
                setTimeout(() => {
                    addResult(`SONUÇ: ${d1} isimli şahsın şüpheli bağlantıları ve dijital ayak izleri OSINT raporu olarak hazırlandı.`, "#00ff41");
                    window.open(`https://www.google.com/search?q="${d1}"+OR+intext:"${d1}"`, '_blank');
                }, 2000);
            } else if(sel === 'İhbar Hattı') {
                addLog("ANONİM İHBAR: Veriler şifrelendi, EGM siber sistemine uçuruldu.", "#00ff41");
                window.open("https://www.egm.gov.tr/siber/ihbar", "_blank");
            } else if(sel === 'C31K/ATAT Takip') {
                addLog(`BİLGİ: ${d1} örgüt yapısı deşifre ediliyor. Linkler jandarma istihbarat havuzuna eklendi.`, "#00ff41");
            } else {
                addLog("İşlem başarıyla tamamlandı. Veri merkeze aktarıldı.", "#00ff41");
            }
        }, 1500);
    }
</script>
</body>
</html>
