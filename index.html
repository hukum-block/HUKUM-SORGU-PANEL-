<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HÜKÜM-SORGU | SİBER İSTİHBARAT MERKEZİ</title>
    <style>
        :root { --neon: #00ff41; --danger: #ff0000; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 0; }
        .hidden { display: none; }
        
        /* GÜVENLİK DUVARI (GİRİŞ) */
        #auth-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); position: fixed; width: 100%; z-index: 1000; }
        .auth-box { border: 2px solid var(--neon); padding: 30px; border-radius: 10px; box-shadow: 0 0 30px var(--neon); text-align: center; width: 85%; }
        input, button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; margin: 10px 0; width: 100%; box-sizing: border-box; }
        button { font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: var(--neon); color: #000; }

        /* PANEL ANA YAPI */
        #main-panel { padding: 15px; }
        .terminal { background: #000; border: 1px solid #333; padding: 10px; height: 150px; overflow-y: auto; font-size: 12px; margin-bottom: 20px; color: #00ff00; border-left: 3px solid var(--neon); }
        
        /* 50 KOMUT SİSTEMİ */
        .grid-50 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; }
        .cmd-btn { font-size: 10px; padding: 8px; border: 1px solid #444; background: #111; color: var(--neon); cursor: pointer; }
        .cmd-btn:hover { background: #003300; border-color: var(--neon); }

        /* MULTIPLAYER SOHBET VE SES (TIKTOK TARZI) */
        .live-stream { border: 2px solid var(--danger); border-radius: 10px; margin-top: 20px; padding: 10px; background: #111; }
        .users-list { display: flex; overflow-x: auto; gap: 10px; padding: 10px; }
        .user-circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #555; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; position: relative; }
        .user-circle.speaking { border-color: var(--danger); box-shadow: 0 0 10px var(--danger); animation: pulse 1s infinite; }
        
        .chat-multi { height: 200px; border: 1px solid var(--neon); margin-top: 10px; display: flex; flex-direction: column; }
        #chat-logs { flex-grow: 1; overflow-y: auto; padding: 5px; font-size: 11px; }

        /* KILAVUZ */
        .guide-section { background: #111; padding: 15px; border: 1px solid #333; margin-top: 20px; text-align: left; font-size: 11px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="margin:0;">HÜKÜM-SORGU</h1>
            <p>SİBER SAVUNMA BİRİMİ</p>
            <input type="text" id="user" placeholder="Kod Adın">
            <input type="password" id="pass" placeholder="Güvenlik Anahtarı">
            <button onclick="login()">SİSTEMİ AKTİFLEŞTİR</button>
        </div>
    </div>

    <div id="main-panel" class="hidden">
        <div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--neon); padding-bottom:5px;">
            <span>OPERATÖR: <b id="op-name"></b></span>
            <span style="color:red">DURUM: AKTİF</span>
        </div>

        <h4>KOMUT ÇIKTILARI (VERİ MERKEZİ)</h4>
        <div class="terminal" id="terminal-out">Sistem hazır. Hedef girin ve komut seçin...</div>
        <input type="text" id="target" placeholder="Hedef IP, Domain veya Telefon...">

        <div class="grid-50" id="cmd-container"></div>

        <div class="live-stream">
            <div style="display:flex; justify-content:space-between;">
                <span style="color:red; font-weight:bold;">● CANLI YAYIN KONFERANSI</span>
                <button onclick="joinStream()" id="stream-btn" style="width:100px; font-size:10px; padding:2px;">KATIL</button>
            </div>
            <div class="users-list" id="active-users">
                <div class="user-circle speaking">EYMEN</div>
            </div>
            <div class="chat-multi">
                <div id="chat-logs"><i>Sohbet odasına bağlandınız...</i></div>
                <div style="display:flex;">
                    <input type="text" id="chat-in" placeholder="Mesaj..." style="margin:0; border:none; border-top:1px solid var(--neon);">
                    <button onclick="send()" style="width:60px; margin:0; border:none; background:var(--neon); color:#000;">OK</button>
                </div>
            </div>
        </div>

        <div class="guide-section" id="guide-area">
            <h3 style="color:var(--neon)">SİBER KOMUT KILAVUZU</h3>
            <div id="guide-content">Yükleniyor...</div>
        </div>
    </div>

    <script>
        const commands = [
            "Whois", "IP Geo", "Port Scan", "DNS Lookup", "Rev-IP", "Subdomain", "Trace", "SSL Check", "Shodan", "Pwned",
            "HoneyPot", "Ping", "Robots", "CF Bypass", "MAC Info", "Hash Dec", "EXIF Analiz", "Social Find", "Virus Scan", "SQL Map",
            "Proxy", "CMS Det", "Mail Auth", "Log Save", "Dorking", "Attack Analiz", "Phish Det", "SiteMap", "EGM İhbar", "Admin Panel",
            "DDoS Guard", "Packet Trace", "ISP Check", "OS Detect", "Headers", "Firewall Check", "Cookie Analiz", "WayBack", "Phone Info", "Metadata",
            "Port 80/443", "User-Agent", "IP History", "DNS Bruteforce", "Dir Scan", "Link Analiz", "API Key Scan", "ZeroDay Check", "Rat Detect", "Hüküm Final"
        ];

        const guideData = {
            "Whois": "Sitenin gerçek sahibini ve kayıt tarihini gösterir.",
            "IP Geo": "Hedefin bağlı olduğu şehir ve operatör bilgisini (Adres temeli) verir.",
            "Pwned": "Hedef mailin hangi sitelerde şifresinin çalındığını bulur (Korkutmak için birebir).",
            "Phone Info": "Telefon numarasının hangi operatöre ve bölgeye ait olduğunu sorgular.",
            "Rat Detect": "Kendi cihazındaki casus yazılımları bulur."
        };

        function login() {
            const u = document.getElementById("user").value;
            const p = document.getElementById("pass").value;
            if(u && p) {
                document.getElementById("auth-screen").classList.add("hidden");
                document.getElementById("main-panel").classList.remove("hidden");
                document.getElementById("op-name").innerText = u.toUpperCase();
                setup();
            }
        }

        function setup() {
            const cont = document.getElementById("cmd-container");
            const gCont = document.getElementById("guide-content");
            commands.forEach((c, i) => {
                let b = document.createElement("button");
                b.className = "cmd-btn";
                b.innerText = (i+1) + "." + c;
                b.onclick = () => runCmd(c);
                cont.appendChild(b);

                let gItem = document.createElement("p");
                gItem.innerHTML = `<b>${c}:</b> ${guideData[c] || "Siber analiz ve veri toplama işlemi."}`;
                gCont.appendChild(gItem);
            });
        }

        function runCmd(c) {
            const t = document.getElementById("target").value;
            const out = document.getElementById("terminal-out");
            if(!t) return alert("Hedef girmeden operasyon başlamaz!");
            
            // GERÇEK BİLGİ SİMÜLASYONU (API BAĞLANTISI GİBİ ÇALIŞIR)
            out.innerHTML += `<br> [>] ${c} Sorgulanıyor: ${t}...`;
            setTimeout(() => {
                let res = "";
                if(c === "IP Geo") res = "LOKASYON: Kurtalan/Siirt - Operatör: Türk Telekom - IP: 176.XXX...";
                else if(c === "Phone Info") res = "OPERATÖR: Turkcell - DURUM: Aktif - BÖLGE: Güneydoğu Anadolu";
                else res = "VERİ: İşlem başarılı, loglar kaydedildi.";
                out.innerHTML += `<br> <span style="color:white">SONUÇ: ${res}</span>`;
                out.scrollTop = out.scrollHeight;
            }, 1000);
        }

        function send() {
            const inp = document.getElementById("chat-in");
            if(!inp.value) return;
            document.getElementById("chat-logs").innerHTML += `<div><b>${document.getElementById("op-name").innerText}:</b> ${inp.value}</div>`;
            inp.value = "";
        }

        function joinStream() {
            const btn = document.getElementById("stream-btn");
            if(btn.innerText === "KATIL") {
                btn.innerText = "AYRIL";
                alert("Ses kanalı aktif. Mikrofon hazır.");
            } else {
                btn.innerText = "KATIL";
            }
        }
    </script>
</body>
</html>
