<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HÜKÜM SİBER MERKEZ | EYO PAŞA</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 10px; }
        .header { border: 2px solid var(--neon); padding: 5px; text-align: center; margin-bottom: 10px; box-shadow: 0 0 15px var(--neon); }
        
        /* ÖZEL LOG KANALI */
        #log-terminal { background: #000; border: 1px solid var(--neon); height: 180px; overflow-y: auto; padding: 10px; font-size: 11px; margin-bottom: 15px; border-radius: 5px; }
        .log-entry { margin-bottom: 3px; border-left: 2px solid var(--neon); padding-left: 5px; }

        /* ANA MENÜLER */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .menu-btn { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 15px; font-weight: bold; cursor: pointer; text-align: center; font-size: 12px; }
        .menu-btn:hover { background: #004400; box-shadow: 0 0 10px var(--neon); }

        /* KOMUT PANELİ */
        #cmd-panel { display: none; margin-top: 15px; border: 1px solid #0ff; padding: 15px; background: #001100; border-radius: 10px; }
        .cmd-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .action-btn { background: #000; border: 1px solid #0ff; color: #0ff; padding: 10px; font-size: 10px; cursor: pointer; border-radius: 3px; }
        
        /* OPERASYON FORMU */
        #op-form { display: none; margin-top: 20px; border-top: 1px dashed var(--neon); padding-top: 15px; }
        .op-input { background: #000; border: 1px solid var(--neon); color: var(--neon); width: 100%; padding: 12px; box-sizing: border-box; margin-bottom: 10px; }
        .op-exec { background: var(--neon); color: #000; border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <strong>BAŞKOMUTAN: EYO PAŞA</strong> | <span style="color:red">GİZLİLİK: %100</span>
</div>

<div id="log-terminal">
    <div class="log-entry">[INFO] Hüküm Veri Merkezi Aktif.</div>
    <div class="log-entry">[INFO] Anonim Proxy Zinciri Kuruldu.</div>
</div>

<div class="menu-grid" id="main-nav">
    </div>

<div id="cmd-panel">
    <h3 id="unit-title" style="margin:0 0 10px 0; color:#0ff;">BİRİM KOMUTLARI</h3>
    <div class="cmd-grid" id="unit-btns"></div>

    <div id="op-form">
        <p id="op-desc" style="font-size:12px; color:#ffff00;"></p>
        <div id="form-fields"></div>
        <button class="op-exec" onclick="launchOperation()">OPERASYONU BAŞLAT</button>
    </div>
</div>

<script>
    const units = {
        "Siber Şube": ["IP Sorgu", "Konum Bul", "ISP Analiz", "DNS Trace", "Port Tarama", "Cihaz Tespiti", "Sistem Sürümü", "MAC Adresi", "Ağ Analizi", "Bot Kontrol"],
        "İllegal İhbar": ["EGM Anonim Bildir", "Terör İhbarı", "Siber Suç Bildir", "Çocuk İstismarı", "Dolandırıcılık", "Uyuşturucu Ticareti", "Discord Baskın", "Site Kapatma"],
        "İstihbarat": ["OSINT Tarama", "Kullanıcı İzle", "Email Sızıntı", "Sosyal Medya", "Veri Tabanı", "Meta Veri", "Telefon Sorgu", "Dijital Kimlik"],
        "Beyaz Şapka": ["Site Zafiyet", "SSL Testi", "WAF Geçiş", "DDOS Savunma", "Log Temizle", "XSS Kontrol", "SQLi Tarama", "Güvenlik Duvarı"]
    };

    let selectedUnit = "";
    let selectedOp = "";

    function init() {
        const nav = document.getElementById('main-nav');
        Object.keys(units).forEach(key => {
            nav.innerHTML += `<div class="menu-btn" onclick="openUnit('${key}')">${key.toUpperCase()}</div>`;
        });
    }

    function addLog(msg, type="INFO") {
        const terminal = document.getElementById('log-terminal');
        const color = type === "CRITICAL" ? "red" : (type === "SUCCESS" ? "#00ff41" : "white");
        terminal.innerHTML += `<div class="log-entry" style="color:${color}">[${new Date().toLocaleTimeString()}] [${type}] ${msg}</div>`;
        terminal.scrollTop = terminal.scrollHeight;
    }

    function openUnit(unit) {
        selectedUnit = unit;
        document.getElementById('cmd-panel').style.display = 'block';
        document.getElementById('op-form').style.display = 'none';
        document.getElementById('unit-title').innerText = unit + " Operasyonları";
        const btnBox = document.getElementById('unit-btns');
        btnBox.innerHTML = "";
        units[unit].forEach(op => {
            btnBox.innerHTML += `<button class="action-btn" onclick="prepOp('${op}')">${op}</button>`;
        });
        addLog(`${unit} birimi yetkilendirildi.`);
    }

    function prepOp(op) {
        selectedOp = op;
        document.getElementById('op-form').style.display = 'block';
        document.getElementById('op-desc').innerText = `DİKKAT: ${op} işlemi tamamen anonim olarak yürütülecektir.`;
        const fields = document.getElementById('form-fields');
        fields.innerHTML = "";
        
        if(op.includes("İhbar") || op.includes("Bildir")) {
            fields.innerHTML = `
                <input type="text" id="target" class="op-input" placeholder="Şüpheli Kişi/Site/Grup Bilgisi">
                <input type="text" id="reason" class="op-input" placeholder="Suç Detayı (Örn: Vatan Hainliği)">
            `;
        } else {
            fields.innerHTML = `<input type="text" id="target" class="op-input" placeholder="Hedef IP veya Domain girin...">`;
        }
        addLog(`${op} için operatör girdisi bekleniyor...`);
    }

    function launchOperation() {
        const target = document.getElementById('target').value;
        if(!target) return alert("Hedef belirtilmedi!");

        addLog(`OPERASYON BAŞLATILDI: ${selectedOp}`, "CRITICAL");
        addLog(`Anonim Katman Devrede: Tor Gateway %100.`);
        
        setTimeout(() => {
            addLog(`Veri İşleniyor: ${target}...`, "INFO");
            setTimeout(() => {
                if(selectedOp.includes("İhbar")) {
                    addLog(`BİLDİRİ: ${target} hakkındaki kanıtlar şifrelendi. Anonim olarak resmi makamlara iletildi.`, "SUCCESS");
                    addLog(`SONUÇ: İhbar işleme alındı. Emniyet birimleri bilgilendirildi.`, "SUCCESS");
                } else {
                    addLog(`SONUÇ: ${target} verileri çekildi. Log kanalı güncellendi.`, "SUCCESS");
                }
            }, 1500);
        }, 1000);
    }

    init();
</script>
</body>
</html>
