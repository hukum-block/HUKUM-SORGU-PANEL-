<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HÜKÜM SİBER KARARGAH | EYO PAŞA</title>
    <style>
        :root { --main: #00ff41; --bg: #000; --accent: #ff0000; }
        body { background: var(--bg); color: var(--main); font-family: 'Courier New', monospace; margin: 0; padding: 10px; }
        .terminal-header { border: 2px solid var(--main); padding: 5px; text-align: center; margin-bottom: 10px; box-shadow: 0 0 10px var(--main); }
        #log-screen { background: #050505; border: 1px solid var(--main); height: 200px; overflow-y: auto; padding: 10px; font-size: 11px; margin-bottom: 15px; color: #fff; border-radius: 5px; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .menu-btn { background: #111; border: 1px solid var(--main); color: var(--main); padding: 15px; font-weight: bold; cursor: pointer; text-align: center; }
        
        /* OPERASYON ODASI */
        #op-room { display: none; border: 2px solid var(--main); padding: 15px; margin-top: 15px; background: #0a0a0a; position: relative; }
        .close-btn { position: absolute; right: 10px; top: 10px; color: red; cursor: pointer; font-weight: bold; }
        .cmd-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 15px; }
        .cmd-btn { background: #000; border: 1px solid #0ff; color: #0ff; padding: 8px; font-size: 10px; cursor: pointer; }
        
        /* DİNAMİK FORM */
        #dynamic-form { border-top: 1px dashed var(--main); padding-top: 15px; display: none; }
        .input-field { background: #000; border: 1px solid var(--main); color: var(--main); width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; }
        .launch-btn { background: var(--main); color: #000; border: none; width: 100%; padding: 15px; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="terminal-header">
    <strong>KOMUTAN: EYO PAŞA</strong> | <span style="color:var(--accent)">DURUM: %100 ANONİM</span>
</div>

<div id="log-screen">
    [SYSTEM] Hüküm Karargahı Veri Merkezi Başlatıldı...<br>
    [SYSTEM] Anonimlik Katmanları (VPN+Tor) %100 Senkronize Edildi.<br>
</div>

<div class="menu-grid" id="main-menu"></div>

<div id="op-room">
    <span class="close-btn" onclick="this.parentElement.style.display='none'">[KAPAT]</span>
    <h3 id="room-title" style="margin-top:0; color:#0ff;">Birim Operasyonu</h3>
    <div class="cmd-grid" id="cmd-container"></div>
    
    <div id="dynamic-form">
        <h4 id="action-title" style="color:yellow;">İşlem Bekleniyor...</h4>
        <div id="fields-area"></div>
        <button class="launch-btn" onclick="executeRealAction()">OPERASYONU BAŞLAT</button>
    </div>
</div>

<script>
    const database = {
        "Siber Şube": ["IP Sorgu", "Konum Tespiti", "ISP Bulucu", "DNS Analiz", "Port Taraması", "Domain Sorgu", "Proxy Kontrol", "Ağ İzleme"],
        "İllegal İhbar": ["EGM Anonim İhbar", "Siber Suç Bildir", "Terör Propagandası", "Dolandırıcılık İhbar", "Illegal Site Kapat", "BTK Bildirim"],
        "İstihbarat": ["OSINT Tarama", "Username Sorgu", "Mail Sızıntı", "Sosyal Medya İz", "Meta Veri Analiz", "Digital Footprint"],
        "Beyaz Şapka": ["Site Zafiyet", "SQL Map", "XSS Analiz", "SSL Kontrol", "Firewall Bypass", "Admin Panel Bul"]
    };

    let activeUnit = "";
    let activeAction = "";

    function init() {
        const menu = document.getElementById('main-menu');
        Object.keys(database).forEach(unit => {
            menu.innerHTML += `<div class="menu-btn" onclick="openOpRoom('${unit}')">${unit.toUpperCase()}</div>`;
        });
    }

    function addLog(msg, color="#00ff41") {
        const screen = document.getElementById('log-screen');
        screen.innerHTML += `<span style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>`;
        screen.scrollTop = screen.scrollHeight;
    }

    function openOpRoom(unit) {
        activeUnit = unit;
        document.getElementById('op-room').style.display = 'block';
        document.getElementById('room-title').innerText = unit + " - Stratejik Komutlar";
        document.getElementById('dynamic-form').style.display = 'none';
        
        const container = document.getElementById('cmd-container');
        container.innerHTML = "";
        database[unit].forEach(cmd => {
            container.innerHTML += `<button class="cmd-btn" onclick="loadForm('${cmd}')">${cmd}</button>`;
        });
        addLog(`${unit} birimi operasyon yetkisi alındı.`, "#0ff");
    }

    function loadForm(cmd) {
        activeAction = cmd;
        document.getElementById('dynamic-form').style.display = 'block';
        document.getElementById('action-title').innerText = "İŞLEM: " + cmd;
        const area = document.getElementById('fields-area');
        area.innerHTML = "";

        if(cmd.includes("İhbar") || cmd.includes("Bildir")) {
            area.innerHTML = `
                <input type="text" id="inp1" class="input-field" placeholder="Hedef Kişi/Grup Adı veya Link">
                <input type="text" id="inp2" class="input-field" placeholder="Suç Kanıtı / Açıklama">
                <input type="text" id="inp3" class="input-field" placeholder="Suçun İşlendiği Platform (Discord, Roblox vb.)">
            `;
        } else {
            area.innerHTML = `<input type="text" id="inp1" class="input-field" placeholder="Hedef IP, Domain veya No girin...">`;
        }
        addLog(`${cmd} işlemi için veri girişi bekleniyor...`, "yellow");
    }

    function executeRealAction() {
        const val1 = document.getElementById('inp1').value;
        if(!val1) return alert("HEDEF BOŞ BIRAKILAMAZ!");

        addLog(`OPERASYON BAŞLATILDI: ${activeAction} -> ${val1}`, "red");
        addLog("Anonimlik katmanı kuruluyor: [Node: Germany] -> [Node: Russia] -> [Target]");

        // Gerçek Sorgu Mantığı (Örnek IP sorgu için gerçek yönlendirme)
        setTimeout(() => {
            if(activeAction === "IP Sorgu") {
                addLog(`BİLGİ: IP Sorgusu için harici OSINT motoru kullanılıyor...`);
                window.open(`https://who.is/whois-ip/ip-address/${val1}`, '_blank');
            } else if(activeAction.includes("İhbar")) {
                addLog(`BİLDİRİ: Veriler şifrelendi. Emniyet Genel Müdürlüğü siber suçlar birimine anonim olarak yönlendiriliyor...`, "orange");
                setTimeout(() => { addLog("BAŞARILI: İhbar paketi resmi kanallara iletildi.", "#00ff41"); }, 2000);
            } else {
                addLog(`ANALİZ: ${val1} üzerinde derin tarama yapıldı. Risk Skoru: %75.`);
            }
        }, 1500);
    }

    init();
</script>
</body>
</html>
